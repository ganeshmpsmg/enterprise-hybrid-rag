name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
    tags: ['v*.*.*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [staging, production]

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/enterprise-hybrid-rag
  # This forces actions to run on Node 24.
  # The deprecation warning may persist until dependencies are updated.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install black isort flake8 mypy
      - name: Check formatting
        # Use || true to see all errors if desired, 
        # or leave as is to fail fast on first error
        run: |
          black --check src/ tests/
          isort --check-only src/ tests/
      - name: Lint with Flake8
        run: flake8 src/ tests/ --max-line-length=120 --exclude=__pycache__,.venv
      - name: Type check with mypy
        run: mypy src/ --ignore-missing-imports --install-types --non-interactive

  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock
      - name: Run unit tests
        run: pytest tests/unit/ -v --cov=src --cov-fail-under=70 -x
        env:
          OPENAI_API_KEY: "sk-test-key"
          LLM_PROVIDER: "openai"

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: test-unit
    services:
      chromadb:
        image: chromadb/chroma:0.5.23
        ports: [8001:8000]
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ragdb_test
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpassword
        ports: [5432:5432]
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx
      - name: Run integration tests
        run: pytest tests/integration/ -v -x
        env:
          CHROMA_HOST: localhost
          CHROMA_PORT: 8001
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DB: ragdb_test
          POSTGRES_USER: raguser
          POSTGRES_PASSWORD: ragpassword
          VECTOR_STORE: chroma

  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: [test-unit, test-integration]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.ref == 'refs/heads/develop'
    steps:
      - name: Deploy to Kubernetes
        run: echo "Deploying to staging environment..."
